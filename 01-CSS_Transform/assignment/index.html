<!DOCTYPE html>

<body>
  <button class="btn">
    Hover Here
  </button>
  <!--transition slowed down so it isn't instantaneous and choppy-->
  <style>
    .btn {
      transition: transform 400ms;
    }
    .btn:hover {
      transform: translateY(-15px) rotateY(360deg);
    }
  </style>
<!--Button will be moved upward a little bit and spin-->
  </main>
</body>
